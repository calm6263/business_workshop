{% extends 'dashboards/crud/base_crud.html' %}
{% load static %}

{% block crud_content %}
<div class="crud-header">
    <h2>{% if object %}Редактировать заявку №{{ object.application_number }}{% else %}Добавить заявку{% endif %}</h2>
</div>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-add">Сохранить</button>
    <a href="{% url 'dashboards:programapplication_list' %}" class="btn-action btn-view">Отмена</a>
</form>
{% endblock %}
