{% extends 'dashboards/crud/base_crud.html' %}

{% block crud_content %}
<div class="crud-header">
    <h2>Подтверждение удаления</h2>
</div>
<p>Вы уверены, что хотите удалить настройки страницы "<strong>{{ object.page_name }}</strong>"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-delete">Да, удалить</button>
    <a href="{% url 'dashboards:pagesettings_list' %}" class="btn-action btn-view">Отмена</a>
</form>
{% endblock %}
