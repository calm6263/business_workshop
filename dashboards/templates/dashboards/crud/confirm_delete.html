<!-- dashboards/templates/dashboards/crud/confirm_delete.html -->
{% extends "dashboards/crud/base_crud.html" %}
{% load static %}

{% block crud_content %}
<div class="crud-header">
    <h2>Подтверждение удаления</h2>
    <a href="{{ view.success_url }}" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" />
        </svg>
        Назад к списку
    </a>
</div>

<div class="crud-card">
    <div class="crud-card-body text-center">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="1.5">
            <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><circle cx="12" cy="16" r="0.5" fill="#e74c3c" />
        </svg>
        <h3 style="margin: 1rem 0; color: #e74c3c;">Вы уверены?</h3>
        <p>Вы собираетесь удалить объект <strong>"{{ object }}"</strong>. Это действие нельзя отменить.</p>

        <form method="post" style="margin-top: 2rem;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{{ view.success_url }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
