{% extends 'dashboards/crud/base_crud.html' %}
{% load static %}

{% block crud_content %}
<div class="crud-header">
    <h2>{% if object %}Редактировать{% else %}Создать{% endif %} Hero-секцию</h2>
</div>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-add">Сохранить</button>
    <a href="{% url 'dashboards:pagehero_list' %}" class="btn-action btn-view">Отмена</a>
</form>
{% endblock %}
