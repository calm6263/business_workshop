<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Внутренняя ошибка сервера</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f8f9fa; }
        .error-container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 72px; margin: 0; color: #dc3545; }
        h2 { font-size: 24px; margin-top: 0; color: #6c757d; }
        p { font-size: 18px; color: #6c757d; }
        img { max-width: 100%; height: auto; margin: 30px 0; }
        a { display: inline-block; margin-top: 20px; padding: 10px 30px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; font-size: 18px; }
        a:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="/static/images/500.png" alt="500 Internal Server Error">
        <h1>500</h1>
        <h2>Внутренняя ошибка сервера</h2>
        <p>На сервере произошла ошибка. Пожалуйста, попробуйте позже или свяжитесь с администратором.</p>
        <a href="/">Вернуться на главную</a>
    </div>
</body>
</html>
