services:
  db:
    image: postgres:15
    container_name: business_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    env_file:
      - .env

  web:
    build: .
    container_name: business_web
    restart: unless-stopped
    volumes:
      - ./static:/app/static
      - ./staticfiles:/app/staticfiles   # ربط المجلد المحلي staticfiles مع المجلد داخل الحاوية
      - ./media:/app/media               # ربط المجلد المحلي media
    expose:
      - 8000
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db
    env_file:
      - .env

  nginx:
    image: nginx:1.25
    container_name: business_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/static               # نفس المجلد staticfiles المحلي يُربط مع /static داخل nginx
      - ./media:/media                       # نفس المجلد media المحلي يُربط مع /media داخل nginx
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data: